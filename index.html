<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>silentfool — Dave Kendall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e0e0e;
      --surface:  #161616;
      --border:   #2a2a2a;
      --text:     #e8e4dc;
      --muted:    #6b6760;
      --accent:   #c8b89a;
      --link:     #d4c4a8;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      /* subtle noise grain */
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 580px;
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 3rem 3.5rem;
      opacity: 0;
      transform: translateY(18px);
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.6rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-weight: 400;
      font-size: clamp(2.4rem, 6vw, 3.4rem);
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .aka {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 2.2rem;
    }

    .divider {
      width: 2.5rem;
      height: 1px;
      background: var(--border);
      margin-bottom: 2rem;
    }

    .bio {
      font-size: 0.88rem;
      line-height: 1.85;
      color: #c0bbb2;
      margin-bottom: 2.8rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .link-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--link);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      padding: 0.55rem 0;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s, color 0.2s;
    }

    .link-row:hover {
      color: var(--text);
      border-bottom-color: var(--border);
    }

    .link-icon {
      width: 1rem;
      height: 1rem;
      opacity: 0.45;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .link-row:hover .link-icon {
      opacity: 0.75;
    }

    .link-label {
      flex: 1;
    }

    .link-arrow {
      font-size: 0.7rem;
      color: var(--muted);
      transition: transform 0.2s, color 0.2s;
    }

    .link-row:hover .link-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 2rem;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: #3a3835;
      text-align: center;
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.75rem; }
    }
  </style>
</head>
<body>

  <div class="card">
    <p class="eyebrow">silentfool.com</p>
    <h1><em>Dave</em> Kendall</h1>
    <p class="aka">aka silentfool</p>
    <div class="divider"></div>
    <p class="bio">
      Designer, Entrepreneur, Sound Engineer.<br>
      Making stuff and helping people since circa 1980.
    </p>

    <nav class="links">

      <a class="link-row" href="mailto:silentfool@gmail.com">
        <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
        <span class="link-label">silentfool@gmail.com</span>
        <span class="link-arrow">→</span>
      </a>

      <a class="link-row" href="https://rapidadapt.co" target="_blank" rel="noopener">
        <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span class="link-label">rapidadapt.co</span>
        <span class="link-arrow">→</span>
      </a>

    </nav>
  </div>

  <footer>© Dave Kendall — silentfool</footer>

</body>
</html>
